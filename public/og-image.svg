<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06060e"/>
      <stop offset="100%" stop-color="#0f0820"/>
    </linearGradient>
    <radialGradient id="glow1" cx="35%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="60%" r="45%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="skull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#a8a8a8"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Borde -->
  <rect x="2" y="2" width="1196" height="626" rx="0" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- ── CALAVERA grande ── -->
  <g transform="translate(720, 80)">
    <!-- Cráneo -->
    <ellipse cx="160" cy="175" rx="145" ry="130" fill="url(#skull)"/>
    <!-- Mandíbula -->
    <rect x="68" y="275" width="184" height="90" rx="28" fill="#c0c0c0"/>
    <!-- Ojo izq -->
    <ellipse cx="112" cy="165" rx="42" ry="46" fill="#06060e"/>
    <!-- Ojo der -->
    <ellipse cx="208" cy="165" rx="42" ry="46" fill="#06060e"/>
    <!-- Brillo ojo izq -->
    <ellipse cx="124" cy="150" rx="14" ry="10" fill="rgba(255,255,255,0.1)"/>
    <ellipse cx="220" cy="150" rx="14" ry="10" fill="rgba(255,255,255,0.1)"/>
    <!-- Nariz -->
    <path d="M146 225 L160 200 L174 225 Q160 240 146 225Z" fill="#06060e"/>
    <!-- Dientes -->
    <rect x="76"  y="316" width="28" height="40" rx="12" fill="#06060e"/>
    <rect x="114" y="316" width="28" height="46" rx="12" fill="#06060e"/>
    <rect x="152" y="316" width="28" height="46" rx="12" fill="#06060e"/>
    <rect x="190" y="316" width="28" height="46" rx="12" fill="#06060e"/>
    <rect x="228" y="316" width="28" height="40" rx="12" fill="#06060e"/>
    <!-- Highlight -->
    <ellipse cx="128" cy="115" rx="50" ry="26" fill="white" opacity="0.08"/>
    <!-- Líneas mejilla -->
    <path d="M22 200 Q10 230 40 262" stroke="#b0b0b0" stroke-width="5" fill="none" opacity="0.3" stroke-linecap="round"/>
    <path d="M298 200 Q310 230 280 262" stroke="#b0b0b0" stroke-width="5" fill="none" opacity="0.3" stroke-linecap="round"/>
  </g>

  <!-- ── TEXTO izquierdo ── -->
  <!-- Tag chip -->
  <rect x="80" y="140" width="160" height="36" rx="18" fill="rgba(124,58,237,0.15)" stroke="rgba(124,58,237,0.35)" stroke-width="1.5"/>
  <text x="160" y="163" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="800" fill="#c084fc" text-anchor="middle" letter-spacing="2">BONES SOCIAL</text>

  <!-- Título grande -->
  <text x="80" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="92" font-weight="900" fill="white" letter-spacing="-2">LA RED</text>
  <text x="80" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="92" font-weight="900" fill="url(#textGrad)" letter-spacing="-2">SOCIAL</text>
  <text x="80" y="455" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="900" fill="white" letter-spacing="-1" opacity="0.9">QUE ESPERABAS</text>

  <!-- Subtítulo -->
  <text x="80" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.5)">Comunidades · Chats · Avatares · Música · Voz</text>

  <!-- URL -->
  <text x="80" y="580" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.25)" letter-spacing="1">bones-web.vercel.app</text>
</svg>
