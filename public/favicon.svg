<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="skull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#b0b0b0"/>
    </linearGradient>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Cráneo -->
  <ellipse cx="32" cy="26" rx="16" ry="14" fill="url(#skull)"/>

  <!-- Mandíbula -->
  <rect x="19" y="35" width="26" height="12" rx="4" fill="#c8c8c8"/>

  <!-- Cuencas oculares -->
  <ellipse cx="25" cy="25" rx="5" ry="5.5" fill="#1a0a2e"/>
  <ellipse cx="39" cy="25" rx="5" ry="5.5" fill="#1a0a2e"/>

  <!-- Brillo ojos -->
  <circle cx="27" cy="23" r="1.5" fill="rgba(255,255,255,0.15)"/>
  <circle cx="41" cy="23" r="1.5" fill="rgba(255,255,255,0.15)"/>

  <!-- Nariz -->
  <path d="M30.5 32 L32 29.5 L33.5 32 Q32 33.5 30.5 32Z" fill="#1a0a2e"/>

  <!-- Dientes -->
  <rect x="20" y="41" width="4" height="5" rx="2" fill="#1a0a2e"/>
  <rect x="26.5" y="41" width="4" height="6" rx="2" fill="#1a0a2e"/>
  <rect x="33.5" y="41" width="4" height="6" rx="2" fill="#1a0a2e"/>
  <rect x="40" y="41" width="4" height="5" rx="2" fill="#1a0a2e"/>

  <!-- Highlight cráneo -->
  <ellipse cx="26" cy="18" rx="6" ry="3" fill="white" opacity="0.12"/>

  <!-- Brillo borde púrpura -->
  <rect width="64" height="64" rx="14" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.5"/>
</svg>
